<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LinkDisk 局域网文件管理器</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="file-manager">
  <!-- 左侧：盘符列表（只保留1个此电脑标题） -->
  <div class="sidebar">
    <div id="device-list" class="device-list"></div>
  </div>

  </div>
</div>

<script src="./main.js"></script>
</body>
</html>
